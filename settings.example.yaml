# Binance Spot Order-Book Wall Scanner — example configuration
#
# Copy this file to `settings.yaml` and adjust as needed.
# `settings.yaml` is git-ignored.

binance:
  # `data-api.binance.vision` and `data-stream.binance.vision` are the public
  # market-data CDN endpoints. They work from regions where the main API
  # (api.binance.com / stream.binance.com) is geo-blocked because they expose
  # only read-only public market data (no trading).
  rest_base: "https://data-api.binance.vision"
  ws_base: "wss://data-stream.binance.vision"

  # Connection limits.
  ws_streams_per_connection: 10   # Binance allows up to ~1024, we stay conservative
  ws_reconnect_delay_sec: 5
  rest_request_timeout_sec: 15

universe:
  # Top-N spot pairs by 24h quote volume.
  top_n: 50
  # Only consider these quote assets.
  quote_assets: ["USDT"]
  # Refresh universe every N minutes (re-fetches volumes and re-selects top-N).
  refresh_minutes: 60

orderbook:
  # Depth fetched on initial REST snapshot. Max 5000.
  snapshot_limit: 5000
  # How often to scan each book for walls (seconds). 1.0 = every second.
  scan_interval_sec: 1.0

detector:
  # Tiered minimum wall size in USD, picked by the symbol's 24h USD volume.
  # First matching tier (volume >= min_24h_volume_usd) wins.
  size_tiers:
    - min_24h_volume_usd: 5_000_000_000   # >= $5B/day
      min_wall_usd:        1_000_000      # wall must be $1M+
    - min_24h_volume_usd:   500_000_000   # $500M – $5B
      min_wall_usd:           500_000     # wall must be $500k+
    - min_24h_volume_usd:             0   # everything else
      min_wall_usd:           150_000     # wall must be $150k+

  # Wall must be within this percentage of mid-price to matter.
  max_distance_pct: 3.0
  # Ignore walls right at the spread (regular limit orders, not "walls").
  min_distance_pct: 0.05

  # Wall must persist this long before we even consider alerting (anti-spoofing).
  min_lifetime_sec: 60

  # Wall must be at least N× the median size of nearby levels on the same side.
  relative_size_multiplier: 3.0
  # How many neighbour levels to use when computing the median (each side of the wall).
  neighbour_levels: 20

  # Walls within this percentage of each other (same side, same symbol) are merged
  # into a single liquidity zone.
  zone_aggregation_pct: 0.10

  # During the first N seconds after startup, walls are tracked but no alerts fire.
  # Prevents a flood of "wall appeared" for walls that were already there.
  cold_start_grace_sec: 120

  # When a wall disappears, classify as EXECUTED if mid-price has crossed
  # the wall price within this many seconds, otherwise CANCELLED.
  execution_window_sec: 5

cooldown:
  # Same wall fingerprint cannot re-alert within this many seconds.
  fingerprint_ttl_sec: 1800   # 30 min

telegram:
  # Set to false to disable Telegram entirely (still logs to walls.jsonl).
  enabled: true
  # Bot token — read from this environment variable.
  token_env: "TG_BOT_TOKEN"
  # Default chat / group / channel id.
  chat_id_env: "TG_CHAT_ID"
  # Optional message_thread_id (forum topic) per tier. Leave empty to send to default chat.
  topic_low_env: "TG_TOPIC_LOW"
  topic_mid_env: "TG_TOPIC_MID"
  topic_high_env: "TG_TOPIC_HIGH"
  # Tier thresholds in USD. Walls smaller than tier_low_usd never alert (extra safety).
  tier_low_usd:  150_000
  tier_mid_usd:  500_000
  tier_high_usd: 2_000_000

persistence:
  # JSONL log of every state-change event, for offline analysis / backtest.
  walls_log_path: "data/walls.jsonl"

logging:
  level: "INFO"
