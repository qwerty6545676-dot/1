<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wall Scanner — heatmap</title>
<style>
  :root {
    --bg: #0d1117;
    --fg: #e6edf3;
    --muted: #7d8590;
    --green: #3fb950;
    --red: #f85149;
    --gold: #d29922;
    --blue: #58a6ff;
    --panel: #161b22;
    --panel2: #1c2128;
    --line: #30363d;
  }
  html, body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    margin: 0; padding: 0;
  }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; border-bottom: 1px solid var(--line);
    background: var(--panel);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header .meta { color: var(--muted); font-size: 12px; }
  header .stats { color: var(--muted); font-size: 11px; margin-left: 12px; }
  header .stats b { color: var(--fg); font-weight: 600; }
  header .stats .sp { color: var(--green); }
  header .stats .rj { color: var(--red); }

  .toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 16px; background: var(--panel2);
    border-bottom: 1px solid var(--line);
    font-size: 12px; flex-wrap: wrap;
  }
  .toolbar .group { display: flex; align-items: center; gap: 6px; }
  .toolbar .group label { color: var(--muted); margin-right: 4px; }
  .toolbar input[type="text"] {
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 4px 8px; font: inherit;
    min-width: 140px;
  }
  .toolbar input[type="text"]:focus { outline: 1px solid var(--blue); border-color: var(--blue); }
  .toolbar button {
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 4px 10px; cursor: pointer;
    font: inherit;
  }
  .toolbar button:hover { border-color: var(--blue); color: var(--blue); }
  .toolbar button:disabled { opacity: 0.5; cursor: wait; }
  .toolbar .modechip {
    padding: 2px 8px; border: 1px solid var(--line);
    border-radius: 12px; cursor: pointer; user-select: none;
    color: var(--muted);
  }
  .toolbar .modechip.on { color: var(--fg); border-color: var(--blue); background: #1f2937; }

  main { display: grid; grid-template-columns: 1fr 320px; gap: 0; }
  #grid { padding: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    padding: 8px; font-size: 12px;
  }
  .card .head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .card .sym { font-weight: 700; font-size: 14px; }
  .card .mode {
    font-size: 10px; padding: 2px 6px; border-radius: 3px;
    background: #21262d; color: var(--muted); margin-left: 6px;
  }
  .card .mid { color: var(--muted); font-variant-numeric: tabular-nums; }
  .card .spark { width: 100%; height: 28px; margin: 4px 0 6px; display: block; }
  .card .spark .line { fill: none; stroke: var(--blue); stroke-width: 1.5; vector-effect: non-scaling-stroke; }
  .card .spark .line.up { stroke: var(--green); }
  .card .spark .line.down { stroke: var(--red); }
  .card .spark .area { fill: var(--blue); opacity: 0.10; }
  .card .spark .area.up { fill: var(--green); }
  .card .spark .area.down { fill: var(--red); }
  .card .delta { font-size: 10px; color: var(--muted); margin-left: 6px; font-variant-numeric: tabular-nums; }
  .card .delta.up { color: var(--green); }
  .card .delta.down { color: var(--red); }

  .ladder { font-variant-numeric: tabular-nums; line-height: 16px; font-size: 11px; }
  .ladder .row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 4px; padding: 0 2px;
    position: relative;
  }
  .ladder .row .px { text-align: left; }
  .ladder .row .qty { text-align: right; color: var(--muted); }
  .ladder .row .usd { text-align: right; }
  .ladder .row .bar {
    position: absolute; right: 0; top: 0; bottom: 0;
    z-index: 0; pointer-events: none;
    opacity: 0.35;
  }
  .ladder .row .px, .ladder .row .qty, .ladder .row .usd { position: relative; z-index: 1; }
  .ask .bar { background: var(--red); }
  .bid .bar { background: var(--green); }
  .mid-row { text-align: center; color: var(--gold); padding: 4px 0;
             border-top: 1px dashed var(--line); border-bottom: 1px dashed var(--line); }
  .wall-marker { color: var(--gold); font-weight: bold; }
  .wall-pending { opacity: 0.5; }
  .empty { color: var(--muted); padding: 20px; text-align: center; }
  aside { border-left: 1px solid var(--line); background: var(--panel); padding: 12px; }
  aside h2 { font-size: 13px; margin: 0 0 6px; color: var(--muted); }
  .events { font-size: 11px; line-height: 1.5; max-height: 50vh; overflow-y: auto; }
  .ev { padding: 4px 0; border-bottom: 1px dashed var(--line); display: grid; grid-template-columns: auto 1fr auto; gap: 8px; }
  .ev .t { color: var(--muted); font-variant-numeric: tabular-nums; }
  .ev .b-bid, .ev .b-bid-side { color: var(--green); }
  .ev .b-ask, .ev .b-ask-side { color: var(--red); }
  .ev .k { font-weight: 600; }
  .icebergs h2 { margin-top: 16px; }
  .ic { padding: 4px 0; border-bottom: 1px dashed var(--line); display: grid; grid-template-columns: auto 1fr auto; gap: 8px; }
  .ic .sym { font-weight: 600; }
  .ic .flow { color: var(--gold); font-weight: 600; }
</style>
</head>
<body>
<header>
  <h1>🧱 Wall Scanner Heatmap</h1>
  <div class="meta">
    <span id="symcount">—</span> symbols ·
    refresh every <span id="refresh">—</span> ms ·
    last update <span id="lastupd">—</span>
    <span class="stats" id="icestats" hidden>
      · 🧊 confirmed <b class="sp" id="ic-confirmed">0</b>
      · spoof rejected <b class="rj" id="ic-rejected">0</b>
    </span>
  </div>
</header>
<div class="toolbar" id="toolbar">
  <div class="group" id="modechips">
    <label>modes:</label>
  </div>
  <div class="group">
    <label for="search">filter:</label>
    <input id="search" type="text" placeholder="symbol substring (e.g. SOL)" autocomplete="off">
  </div>
  <div class="group" style="margin-left:auto">
    <button id="exportBtn" type="button" title="Save the dashboard view as PNG">📸 Export PNG</button>
  </div>
</div>
<main id="app">
  <div id="grid"><div class="empty">loading…</div></div>
  <aside>
    <h2>Recent wall events</h2>
    <div class="events" id="events"><div class="empty">no events yet</div></div>
    <div class="icebergs">
      <h2>🧊 Recent icebergs</h2>
      <div class="events" id="icebergs"><div class="empty">no icebergs yet</div></div>
    </div>
  </aside>
</main>
<script src="/static/html2canvas.min.js"></script>
<script>
const fmtUsd = (u) => u >= 1_000_000 ? `$${(u/1_000_000).toFixed(2)}M`
                    : u >= 1_000     ? `$${(u/1_000).toFixed(0)}k`
                    : `$${u.toFixed(0)}`;
const fmtPx  = (p) => p >= 100 ? p.toFixed(2)
                    : p >= 1   ? p.toFixed(4)
                    :            p.toFixed(6);
const fmtQty = (q) => q >= 1000 ? q.toLocaleString(undefined,{maximumFractionDigits:0})
                    : q >= 1    ? q.toFixed(2)
                    :             q.toFixed(4);
const fmtTs  = (ts) => {
  const d = new Date(ts);
  return d.toLocaleTimeString();
};

// ----- filter state (persists across refreshes) ---------------------
const FILTER = {
  modes: new Set(),       // empty = all enabled
  query: "",
};
const KNOWN_MODES = new Set();

function rebuildModeChips() {
  const wrap = document.getElementById("modechips");
  // Remove old chips (keep the label).
  while (wrap.children.length > 1) wrap.removeChild(wrap.lastChild);
  for (const m of Array.from(KNOWN_MODES).sort()) {
    const chip = document.createElement("span");
    chip.className = "modechip" + (FILTER.modes.has(m) ? " on" : "");
    chip.textContent = m;
    chip.addEventListener("click", () => {
      if (FILTER.modes.has(m)) FILTER.modes.delete(m);
      else FILTER.modes.add(m);
      rebuildModeChips();
      tick();   // immediate re-render with current cached data via fetch
    });
    wrap.appendChild(chip);
  }
}

function passesFilter(s) {
  if (FILTER.modes.size > 0 && !FILTER.modes.has(s.mode)) return false;
  if (FILTER.query && !s.symbol.toLowerCase().includes(FILTER.query.toLowerCase())) return false;
  return true;
}

// ----- sparkline -----------------------------------------------------
function renderSparkline(values) {
  if (!values || values.length < 2) {
    return `<svg class="spark" viewBox="0 0 100 28" preserveAspectRatio="none"></svg>`;
  }
  const lo = Math.min(...values);
  const hi = Math.max(...values);
  const range = hi - lo || 1;
  const w = 100, h = 28;
  const dx = w / (values.length - 1);
  const pts = values.map((v, i) => {
    const y = h - ((v - lo) / range) * (h - 4) - 2;
    return `${(i * dx).toFixed(2)},${y.toFixed(2)}`;
  }).join(" ");
  const delta = values[values.length - 1] - values[0];
  // Three-state colour: green up, red down, blue (default) for flat / no change.
  const cls = delta > 0 ? "up" : delta < 0 ? "down" : "";
  // Area path: line points + bottom-right + bottom-left corners
  const area = `M0,${h} L${pts.split(" ").join(" L ")} L${w},${h} Z`;
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path class="area ${cls}" d="${area}"/>
    <polyline class="line ${cls}" points="${pts}"/>
  </svg>`;
}

// ----- per-card render ----------------------------------------------
function renderLadder(symData) {
  const wallByPrice = new Map();
  for (const w of (symData.walls || [])) {
    wallByPrice.set(w.price, w);
  }
  const allBidUsd = symData.bids.map(l => l.usd);
  const allAskUsd = symData.asks.map(l => l.usd);
  const maxUsd = Math.max(1, ...allBidUsd, ...allAskUsd);

  function row(level, side) {
    const w = wallByPrice.get(level.price);
    const isWall = !!w;
    const wallActive = w && w.state === "ACTIVE";
    const wallPending = w && !wallActive;
    const widthPct = Math.min(100, (level.usd / maxUsd) * 100);
    const cls = `row ${side}` + (wallPending ? ` wall-pending` : ``);
    const marker = isWall ? `<span class="wall-marker">${wallActive ? "▌" : "·"}</span>` : "";
    return `<div class="${cls}">
      <span class="bar" style="width:${widthPct}%"></span>
      <span class="px">${marker}${fmtPx(level.price)}</span>
      <span class="qty">${fmtQty(level.qty)}</span>
      <span class="usd">${fmtUsd(level.usd)}</span>
    </div>`;
  }

  const asksHtml = symData.asks.slice().reverse().map(l => row(l, "ask")).join("");
  const bidsHtml = symData.bids.map(l => row(l, "bid")).join("");
  const distAsk = symData.best_ask && symData.mid
    ? ` (+${(((symData.best_ask - symData.mid) / symData.mid) * 100).toFixed(3)}%)` : "";
  const distBid = symData.best_bid && symData.mid
    ? ` (-${(((symData.mid - symData.best_bid) / symData.mid) * 100).toFixed(3)}%)` : "";

  const spark = symData.sparkline || [];
  let deltaHtml = "";
  if (spark.length >= 2) {
    const first = spark[0], last = spark[spark.length - 1];
    const pct = ((last - first) / first) * 100;
    const sign = pct > 0 ? "+" : "";
    const cls = pct > 0 ? "up" : pct < 0 ? "down" : "";
    deltaHtml = `<span class="delta ${cls}">${sign}${pct.toFixed(2)}%</span>`;
  }

  return `
    <div class="card">
      <div class="head">
        <div><span class="sym">${symData.symbol}</span><span class="mode">${symData.mode}</span></div>
        <div class="mid">mid ${fmtPx(symData.mid)}${deltaHtml}</div>
      </div>
      ${renderSparkline(spark)}
      <div class="ladder">
        ${asksHtml}
        <div class="row mid-row">— mid ${fmtPx(symData.mid)} —${distAsk}${distBid}</div>
        ${bidsHtml}
      </div>
    </div>`;
}

function renderEvents(events) {
  if (!events.length) return `<div class="empty">no events yet</div>`;
  return events.map(e => {
    const sideCls = e.side === "bid" ? "b-bid" : "b-ask";
    const kindEmoji = e.kind === "appeared" ? (e.side === "bid" ? "🟩" : "🟥")
                    : e.kind === "cancelled" ? "⬜️"
                    : e.kind === "executed" ? "💥" : "•";
    return `<div class="ev">
      <span class="t">${fmtTs(e.ts_ms)}</span>
      <span><span class="k">${kindEmoji}</span> ${e.symbol} <span class="${sideCls}">${e.side}</span> @ ${fmtPx(e.price)}</span>
      <span>${fmtUsd(e.usd_value)}</span>
    </div>`;
  }).join("");
}

function renderIcebergs(events) {
  if (!events.length) return `<div class="empty">no icebergs yet</div>`;
  return events.map(e => {
    const sideCls = e.side === "bid" ? "b-bid-side" : "b-ask-side";
    return `<div class="ic">
      <span class="t">${fmtTs(e.ts_ms)}</span>
      <span><span class="sym">🧊 ${e.symbol}</span> <span class="${sideCls}">${e.side}</span> @ ${fmtPx(e.price)} (${e.regen_count}×)</span>
      <span class="flow">${fmtUsd(e.cumulative_usd)}</span>
    </div>`;
  }).join("");
}

// ----- main loop ----------------------------------------------------
let refreshMs = 1500;
let _ticking = false;
async function tick() {
  if (_ticking) return;
  _ticking = true;
  try {
    const r = await fetch("/api/state");
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    refreshMs = data.refresh_ms || refreshMs;

    // Track new modes for chip UI.
    const modes = data.modes || [];
    let modesChanged = false;
    for (const m of modes) {
      if (!KNOWN_MODES.has(m)) { KNOWN_MODES.add(m); modesChanged = true; }
    }
    if (modesChanged) rebuildModeChips();

    document.getElementById("refresh").textContent = refreshMs;
    document.getElementById("lastupd").textContent = new Date().toLocaleTimeString();

    // Iceberg stats
    const stats = data.iceberg_stats || {};
    if (stats.anti_spoof) {
      document.getElementById("icestats").hidden = false;
      document.getElementById("ic-confirmed").textContent = stats.confirmed ?? 0;
      document.getElementById("ic-rejected").textContent = stats.rejected_spoof ?? 0;
    }

    const filtered = (data.symbols || []).filter(passesFilter);
    document.getElementById("symcount").textContent =
      filtered.length === (data.symbols || []).length
        ? filtered.length
        : `${filtered.length}/${(data.symbols || []).length}`;

    const grid = document.getElementById("grid");
    if (!filtered.length) {
      const total = (data.symbols || []).length;
      grid.innerHTML = total
        ? `<div class="empty">no symbols match the filter</div>`
        : `<div class="empty">waiting for book sync…</div>`;
    } else {
      grid.innerHTML = filtered.map(renderLadder).join("");
    }
    document.getElementById("events").innerHTML   = renderEvents(data.events || []);
    document.getElementById("icebergs").innerHTML = renderIcebergs(data.icebergs || []);
  } catch (e) {
    document.getElementById("lastupd").textContent = "ERROR: " + e.message;
  } finally {
    _ticking = false;
    setTimeout(tick, refreshMs);
  }
}

document.getElementById("search").addEventListener("input", (e) => {
  FILTER.query = e.target.value.trim();
  tick();
});

// ----- PNG export via html2canvas -----------------------------------
async function exportPng() {
  const btn = document.getElementById("exportBtn");
  btn.disabled = true;
  const oldLabel = btn.textContent;
  btn.textContent = "rendering…";
  try {
    if (typeof html2canvas !== "function") {
      throw new Error("html2canvas script not loaded");
    }
    const target = document.body;
    const canvas = await html2canvas(target, {
      backgroundColor: "#0d1117",
      scale: window.devicePixelRatio > 1 ? 2 : 1,
      useCORS: true,
      logging: false,
      windowWidth: document.documentElement.scrollWidth,
      windowHeight: document.documentElement.scrollHeight,
    });
    const pngBlob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
    if (!pngBlob) throw new Error("canvas-toBlob returned null");
    const pngUrl = URL.createObjectURL(pngBlob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().replace(/[:T]/g, "-").slice(0, 19);
    a.download = `wall-scanner-${stamp}.png`;
    a.href = pngUrl;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(pngUrl), 1000);
  } catch (e) {
    alert("PNG export failed: " + e.message);
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = oldLabel;
  }
}

document.getElementById("exportBtn").addEventListener("click", exportPng);

tick();
</script>
</body>
</html>
